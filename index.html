<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* 头部名片 */
        .hero {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 24px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 3px solid #e5e7eb;
        }

        .hero h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero .bio {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .link-btn {
            padding: 8px 20px;
            border-radius: 20px;
            background: #f3f4f6;
            color: #333;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .link-btn:hover {
            background: #667eea;
            color: #fff;
        }

        /* 通用卡片 */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            margin-bottom: 24px;
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #222;
            border-left: 4px solid #667eea;
            padding-left: 10px;
        }

        /* 技能标签 */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            padding: 6px 14px;
            background: #eef2ff;
            color: #4f46e5;
            border-radius: 12px;
            font-size: 14px;
        }

        /* 作品列表 */
        .project-list {
            display: grid;
            gap: 16px;
        }

        .project-item {
            padding: 16px;
            background: #f9fafb;
            border-radius: 12px;
        }

        .project-item h3 {
            font-size: 16px;
            margin-bottom: 6px;
            color: #222;
        }

        .project-item p {
            color: #666;
            font-size: 14px;
        }

        /* 页脚 */
        footer {
            text-align: center;
            color: #999;
            font-size: 14px;
            padding: 20px 0;
        }

        /* 手机端适配 */
        @media (max-width: 480px) {
            .hero {
                padding: 30px 20px;
            }
            .card {
                padding: 24px 20px;
            }
            .hero h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部名片：修改这里的头像、名字、介绍 -->
        <div class="hero">
            <img class="avatar" src="https://picsum.photos/200/200" alt="头像">
            <h1>你的名字</h1>
            <p class="bio">在校学生 | 视频剪辑爱好者 | 编程学习者</p>
            <div class="links">
                <a class="link-btn" href="mailto:你的邮箱@example.com">邮箱</a>
                <a class="link-btn" href="#" target="_blank">GitHub</a>
                <a class="link-btn" href="#" target="_blank">作品集</a>
            </div>
        </div>

        <!-- 关于我：修改这里的自我介绍 -->
        <div class="card">
            <h2>关于我</h2>
            <p>目前是一名大二学生，专注于视频剪辑与前端学习。喜欢记录生活，折腾各种数码和软件工具，持续更新学习笔记和作品。</p>
        </div>

        <!-- 技能标签：修改这里的技能 -->
        <div class="card">
            <h2>技能专长</h2>
            <div class="tags">
                <span class="tag">PR/AE剪辑</span>
                <span class="tag">图片修图</span>
                <span class="tag">HTML/CSS</span>
                <span class="tag">Python入门</span>
                <span class="tag">文案撰写</span>
            </div>
        </div>

        <!-- 作品项目：修改这里的作品内容 -->
        <div class="card">
            <h2>代表作品</h2>
            <div class="project-list">
                <div class="project-item">
                    <h3>校园混剪视频</h3>
                    <p>使用PR制作的校园生活短片，累计播放1w+</p>
                </div>
                <div class="project-item">
                    <h3>个人学习笔记站</h3>
                    <p>基于GitHub Pages搭建的个人学习博客</p>
                </div>
            </div>
        </div>

        <footer>
            © 2026 你的名字 · Made with ❤️
        </footer>
    </div>
</body>
</html>
